      - $ref: '#/channels/flameboss~1{deviceId}~1recv/messages/dl_start_down'
    tags:
      - name: Device
  "dl_progress uplink":
    action: receive
    channel:
      $ref: '#/channels/flameboss~1{deviceId}~1send~1data'
    messages:
      - $ref: '#/channels/flameboss~1{deviceId}~1send~1data/messages/dl_progress_up'
    tags:
      - name: Device
  "device_temp uplink":
    action: receive
    channel:
      $ref: '#/channels/flameboss~1{deviceId}~1send~1data'
    messages:
      - $ref: '#/channels/flameboss~1{deviceId}~1send~1data/messages/device_temp_up'
    tags:
      - name: Device
  "dc_input uplink":
    action: receive
    channel:
      $ref: '#/channels/flameboss~1{deviceId}~1send~1data'
    messages:
      - $ref: '#/channels/flameboss~1{deviceId}~1send~1data/messages/dc_input_up'
    tags:
      - name: Device
  "sync downlink":
    action: send
    channel:
      $ref: '#/channels/flameboss~1{deviceId}~1recv'
    messages:
      - $ref: '#/channels/flameboss~1{deviceId}~1recv/messages/sync_down'
    tags:
      - name: Device
  "synced uplink":
    action: receive
    channel:
      $ref: '#/channels/flameboss~1{deviceId}~1send~1data'
    messages:
      - $ref: '#/channels/flameboss~1{deviceId}~1send~1data/messages/synced_up'
    tags:
      - name: Device

  # User
  "connected downlink":
    action: send
    channel:
      $ref: '#/channels/user~1{userId}~1recv'
    messages:
      - $ref: '#/channels/user~1{userId}~1recv/messages/connected_down'
    tags:
      - name: User
  "connected uplink":
    action: receive
    channel:
      $ref: '#/channels/user~1{userId}~1recv'
    messages:
      - $ref: '#/channels/user~1{userId}~1recv/messages/connected_up'
    tags:
      - name: User

  "cook_note downlink":
    action: send
    channel:
      $ref: '#/channels/user~1{userId}~1recv'
    messages:
      - $ref: '#/channels/user~1{userId}~1recv/messages/cook_note_down'
    tags:
      - name: User

  # Deprecated
  "opened uplink":
    action: receive
    channel:
      $ref: '#/channels/flameboss~1{deviceId}~1send~1data'
    messages:
      - $ref: '#/channels/flameboss~1{deviceId}~1send~1data/messages/opened_up'
    tags:
      - name: Deprecated
  "closed uplink":
    action: receive
    channel:
      $ref: '#/channels/flameboss~1{deviceId}~1send~1data'
    messages:
      - $ref: '#/channels/flameboss~1{deviceId}~1send~1data/messages/closed_up'
    tags:
      - name: Deprecated

components:
  messages:
    sync_down:
      tags:
        - name: Device
      summary: Request all settings and readings from the device
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [sync]
        required:
          - name
        example:
          name: "sync"

    dl_progress_up:
      tags:
        - name: Device
      summary: Published periodically during a firmware update to report download progress
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [dl_progress]
          target:
            type: string
            enum: [app]
          version:
            type: string
            description: Version string of the firmware being downloaded (e.g. "1.2.3")
          percent:
            type: integer
            description: Download progress as a percentage from 0 to 100
        required:
          - name
          - target
          - version
          - percent
        example:
          name: "dl_progress"
          target: "app"
          version: "1.2.3"
          percent: 42

    synced_up:
      tags:
        - name: Device
      summary: Sent after all sync uplinks have been published
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [synced]
        required:
          - name
        example:
          name: "synced"

    alarm_ack_down:
      tags:
        - name: Alarms
      summary: Reset and silence any active alert including for pit alert, meat alert, or timer alert
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [alarm_ack]
        required:
          - name
        example:
          name: "alarm_ack"

    id_up:
      tags:
        - name: Device
      summary: Device identification information
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [id]
          hw_id:
            type: integer
            description: Device type ID
          device_id:
            type: integer
            description: Flame Boss device ID
          uid:
            type: string
            description: Base64 encoded UID
          pin:
            type: integer
            description: Optional, only sent when device is in AP mode
        required:
          - name
          - hw_id
          - device_id
          - uid
        example:
          name: "id"
          hw_id: 123
          device_id: 456
          uid: "ABC123DEF456=="

    id_down:
      tags:
        - name: Device
      summary: Request device identification information
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [id]
        required:
          - name
        example:
          name: "id"

    time_up:
      tags:
        - name: Device
      summary: Device current time
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [time]
          epoch:
            type: integer
            description: Time in Unix epoch scale
          ms:
            type: integer
            description: Fraction of second in ms
        required:
          - name
          - epoch
        example:
          name: "time"
          epoch: 1648224000
          ms: 500

    time_down:
      tags:
        - name: Device
      summary: Set device time or request device time
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [time]
          epoch:
            type: integer
            description: Time in Unix epoch scale
          ms:
            type: integer
            description: Fraction of second in ms
        required:
          - name
        example:
          name: "time"
          epoch: 1648224000
          ms: 500

    dns_up:
      tags:
        - name: Network
      summary: DNS configuration information
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [dns]
          ips:
            type: array
            items:
              type: string
            description: Array of strings of IP addresses, up to 2
        required:
          - name
          - ips
        example:
          name: "dns"
          ips: ["192.168.1.100", "8.8.8.8"]

    dns_down:
      tags:
        - name: Network
      summary: Set DNS configuration or request DNS configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [dns]
          ips:
            type: array
            items:
              type: string
            description: |-
              Array of strings of IP addresses, up to 2.
              Omit to request current DNS configuration.
        required:
          - name
        example:
          name: "dns"
          ips: ["192.168.1.100"]

    ip_up:
      tags:
        - name: Network
      summary: IP configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [ip]
          mode:
            type: string
            enum: [manual, dhcp]
          ip:
            type: string
            description: IP address
          netmask:
            type: string
            description: Netmask
          gateway:
            type: string
            description: Gateway IP address
        required:
          - name
          - mode
          - ip
          - netmask
          - gateway
        example:
          name: "ip"
          mode: "dhcp"
          ip: "192.168.1.100"
          netmask: "255.255.255.0"
          gateway: "192.168.1.1"

    ip_down:
      tags:
        - name: Network
      summary: Set or request IP configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [ip]
          mode:
            type: string
            enum: [manual, dhcp]
          ip:
            type: string
            description: IP address
          netmask:
            type: string
            description: Netmask
          gateway:
            type: string
            description: Gateway IP address
        required:
          - name
          - mode
          - ip
          - netmask
          - gateway
        example:
          name: "ip"
          mode: "dhcp"
          ip: "192.168.1.100"
          netmask: "255.255.255.0"
          gateway: "192.168.1.1"

    temps_up:
      tags:
        - name: Cooking
      summary: Temperature readings, set temperature, and blower duty cycle information
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [temps]
          cook_id:
            type: integer
          sec:
            type: integer
            description: Epoch seconds of data point, might be earlier than ts if it was logged on device
          temps:
            type: array
            items:
              type: integer
            description: Array of integers, temperatures at sec in configured temp scale
          set_temp:
            type: integer
          blower:
            type: integer
            description: Blower duty cycle in 0.01% scale (e.g. 2500 = 25%, 10000 = 100%)
        required:
          - name
          - cook_id
          - sec
          - temps
          - set_temp
          - blower
        example:
          name: "temps"
          cook_id: 12345
          sec: 1648224000
          temps: [225, 180, 170, 0]
          set_temp: 225
          blower: 2500

    set_temp_up:
      tags:
        - name: Cooking
      summary: Set temperature
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [set_temp]
          value:
            type: integer
        required:
          - name
          - value
        example:
          name: "set_temp"
          value: 250

    set_temp_down:
      tags:
        - name: Cooking
      summary: Set the set temperature or request current set temperature
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [set_temp]
          value:
            type: integer
            description: Omit to request current set temperature
        required:
          - name
        example:
          name: "set_temp"
          value: 250

    wifi_up:
      tags:
        - name: Network
      summary: WiFi configuration information
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [wifi]
          index:
            type: integer
            enum: [0, 1]
            description: Omitting index is equivalent to index = 0
          ssid:
            type: string
          key:
            type: string
            description: May be omitted on some channels for security policy
        required:
          - name
          - ssid
          - key
        example:
          name: "wifi"
          index: 0
          ssid: "MyWifiNetwork"
          key: "my-wifi-pw"

    wifi_down:
      tags:
        - name: Network
      summary: Set or request WiFi configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [wifi]
          index:
            type: integer
            enum: [0, 1]
            description: Omitting index is equivalent to index = 0
          ssid:
            type: string
          key:
            type: string
        required:
          - name
          - ssid
        example:
          name: "wifi"
          index: 0
          ssid: "MyWifiNetwork"
          key: "wifi-password"

    wifi_cx_up:
      tags:
        - name: Network
      summary: WiFi connection information
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [wifi_cx]
          connected:
            type: boolean
            description: WiFi is connected to an access point. Omitted on single-radio targets where receiving this message implies connected.
          rssi:
            type: integer
            description: RSSI signal strength
          code:
            type: integer
            description: Last error code from attempting to join the configured access point. Useful for diagnosing whether the SSID or password is wrong.
        required:
          - name
        example:
          name: "wifi_cx"
          rssi: -55
          code: 0

    mqtt_up:
      tags:
        - name: Network
      summary: MQTT broker configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [mqtt]
          host:
            type: string
            description: MQTT broker hostname
          ip:
            type: string
            description: MQTT broker IP address
          port:
            type: integer
            description: MQTT broker port
          tls:
            type: boolean
            description: TLS enabled
          username:
            type: string
            description: MQTT username
          local_en:
            type: boolean
            description: Local MQTT broker enabled
          keepalive:
            type: integer
            description: MQTT keepalive interval in seconds
        required:
          - name
          - host
          - ip
          - port
          - tls
          - username
          - local_en
          - keepalive
        example:
          name: "mqtt"
          host: "myflameboss.com"
          ip: "1.2.3.4"
          port: 8883
          tls: true
          username: "fb_12345"
          local_en: true
          keepalive: 60

    mqtt_down:
      tags:
        - name: Network
      summary: Set MQTT broker configuration or request current configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [mqtt]
          host:
            type: string
            description: MQTT broker hostname
          ip:
            type: string
            description: MQTT broker IP address
          tls:
            type: boolean
            description: TLS enabled
          keepalive:
            type: integer
            description: MQTT keepalive interval in seconds, minimum 10, 0 to disable
          timeout:
            type: integer
            description: MQTT timeout in seconds, minimum 5, must be less than keepalive
        required:
          - name
        example:
          name: "mqtt"
          host: "myflameboss.com"
          keepalive: 60
          timeout: 10

    ble_cx_up:
      tags:
        - name: Network
      summary: BLE connection status
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [ble_cx]
          connected:
            type: boolean
        required:
          - name
          - connected
        example:
          name: "ble_cx"
          connected: true

    ble_cx_down:
      tags:
        - name: Network
      summary: Get the status of the BLE interface
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [ble_cx]
        required:
          - name
        example:
          name: "ble_cx"

    meat_alarm_up:
      tags:
        - name: Alarms
      summary: Meat alarm configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [meat_alarm]
          sensor:
            type: integer
            minimum: 1
            maximum: 3
          action:
            type: string
            enum: [off, on, keep_warm]
          done_temp:
            type: integer
          warm_temp:
            type: integer
        required:
          - name
          - sensor
          - action
          - done_temp
          - warm_temp
        example:
          name: "meat_alarm"
          sensor: 1
          action: "on"
          done_temp: 203
          warm_temp: 170

    meat_alarm_down:
      tags:
        - name: Alarms
      summary: Set meat alarm configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [meat_alarm]
          sensor:
            type: integer
            minimum: 1
            maximum: 3
          action:
            type: string
            enum: [off, on, keep_warm]
          done_temp:
            type: integer
          warm_temp:
            type: integer
        required:
          - name
          - sensor
          - action
          - done_temp
          - warm_temp
        example:
          name: "meat_alarm"
          sensor: 1
          action: "on"
          done_temp: 203
          warm_temp: 170

    set_temp_limits_up:
      tags:
        - name: Cooking
      summary: Temperature limit settings
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [set_temp_limits]
          min:
            type: integer
          max:
            type: integer
        required:
          - name
          - min
          - max
        example:
          name: "set_temp_limits"
          min: 150
          max: 500

    pit_alarm_up:
      tags:
        - name: Alarms
      summary: Pit alarm configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [pit_alarm]
          enabled:
            type: boolean
          range:
            type: integer
        required:
          - name
          - enabled
          - range
        example:
          name: "pit_alarm"
          enabled: true
          range: 25

    pit_alarm_down:
      tags:
        - name: Alarms
      summary: Set pit alarm configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [pit_alarm]
          enabled:
            type: boolean
          range:
            type: integer
        required:
          - name
          - enabled
          - range
        example:
          name: "pit_alarm"
          enabled: true
          range: 25

    labels_up:
      tags:
        - name: Cooking
      summary: Probe labels
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [labels]
          values:
            type: array
            items:
              type: string
            maxItems: 4
            description: Array of 4 strings, max 12 char each
        required:
          - name
          - values
        example:
          name: "labels"
          values: ["Pit", "Brisket", "Butt", "Turkey"]

    labels_down:
      tags:
        - name: Cooking
      summary: Set probe labels
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [labels]
          values:
            type: array
            items:
              type: string
            maxItems: 4
            description: Array of 4 strings, max 12 char each
        required:
          - name
          - values
        example:
          name: "labels"
          values: ["Pit", "Brisket", "Butt", "Turkey"]

    sound_up:
      tags:
        - name: Device
      summary: Sound configuration and status
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [sound]
          config:
            type: string
            enum: [off, chirps, alarms]
          status:
            type: string
            enum: [alarm, off]
        required:
          - name
          - config
          - status
        example:
          name: "sound"
          config: "chirps"
          status: "off"

    sound_down:
      tags:
        - name: Device
      summary: Set sound configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [sound]
          config:
            type: string
            enum: [off, chirps, alarms]
        required:
          - name
          - config
        example:
          name: "sound"
          config: "chirps"

    pid_up:
      tags:
        - name: Fan Control
      summary: PID controller configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [pid]
          p:
            type: integer
            description: p * 100
          i:
            type: integer
            description: i * 1000
          d:
            type: integer
          ff:
            type: integer
            description: Learned duty cycle when no error from adaptive feed forward method
          min_dc:
            type: integer
            description: Minimum duty cycle
          pvl:
            type: integer
            description: Process value limit, caps output at this number * pit temp
        required:
          - name
          - p
          - i
          - d
          - ff
          - min_dc
          - pvl
        example:
          name: "pid"
          p: 1000
          i: 500
          d: 250
          ff: 3000
          min_dc: 1500
          pvl: 2

    pid_down:
      tags:
        - name: Fan Control
      summary: Set PID controller configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [pid]
          p:
            type: integer
            description: p * 100
          i:
            type: integer
            description: i * 1000
          d:
            type: integer
          ff:
            type: integer
            description: Learned duty cycle when no error from adaptive feed forward method
          min_dc:
            type: integer
            description: Minimum duty cycle
          pvl:
            type: integer
            description: Process value limit, caps output at this number * pit temp
        required:
          - name
          - p
          - i
          - d
          - ff
          - min_dc
          - pvl
        example:
          name: "pid"
          p: 1000
          i: 500
          d: 250
          ff: 3000
          min_dc: 1500
          pvl: 2

    gpid_up:
      tags:
        - name: Fan Control
      summary: BBQ Guru PID controller configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [gpid]
          ramp:
            type: integer
            minimum: 0
            maximum: 4
            description: Ramp, 0 = disabled, 1-3 = ramp pit temp to maintain the food target temp on that probe
          sc:
            type: integer
            minimum: 0
            maximum: 4
            description: Smart cook setting
          cyc:
            type: integer
            minimum: 1
            maximum: 10
            description: Cycle time in seconds when smart cook setting is 4
          prop:
            type: integer
            minimum: 10
            maximum: 50
            description: Proportional band in degrees F when smart cook is 4
        required:
          - name
          - ramp
          - sc
          - cyc
          - prop
        example:
          name: "gpid"
          ramp: 0
          sc: 2
          cyc: 5
          prop: 25

    gpid_down:
      tags:
        - name: Fan Control
      summary: Set BBQ Guru PID controller configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [gpid]
          sc:
            type: integer
            minimum: 0
            maximum: 4
            description: Smart cook setting
          cyc:
            type: integer
            minimum: 1
            maximum: 10
            description: Cycle time in seconds when smart cook setting is 4
          prop:
            type: integer
            minimum: 10
            maximum: 50
            description: Proportional band in degrees F when smart cook is 4
        required:
          - name
          - sc
          - cyc
          - prop
        example:
          name: "gpid"
          sc: 2
          cyc: 5
          prop: 25

    open_pit_up:
      tags:
        - name: Fan Control
      summary: Open pit configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [open_pit]
          enabled:
            type: boolean
            description: Default is true if omitted
          max_pause:
            type: integer
            description: Max open pause time in seconds
        required:
          - name
          - max_pause
        example:
          name: "open_pit"
          max_pause: 300

    open_pit_down:
      tags:
        - name: Fan Control
      summary: Set open pit configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [open_pit]
          max_pause:
            type: integer
            description: Max open pause time in seconds
        required:
          - name
          - max_pause
        example:
          name: "open_pit"
          max_pause: 300

    step_up:
      tags:
        - name: Cooking
      summary: Step configuration and status
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [step]
          index:
            type: integer
            description: 0-based step
          active:
            type: boolean
            description: Currently on this step
          step_name:
            type: string
            description: Name of step
          set_temp:
            type: integer
            description: Set temp to hold during this step
          end_by:
            type: string
            enum: [time, temp, none]
          time:
            type: integer
            description: Time this step lasts in seconds if end_by == time
          temp:
            type: integer
            description: Target temp that causes to next step if end_by == temp
          sensor:
            type: integer
            description: Sensor used for target temp if end_by = temp (default 1 aka meat 1)
          started_at:
            type: integer
            description: Epoch this step started
        required:
          - name
          - index
          - active
          - step_name
          - set_temp
          - end_by
        example:
          name: "step"
          index: 0
          active: true
          step_name: "Smoke"
          set_temp: 225
          end_by: "time"
          time: 7200
          started_at: 1648224000

    step_down:
      tags:
        - name: Cooking
      summary: Set step configuration
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [step]
          index:
            type: integer
            description: 0-based step
          step_name:
            type: string
            description: Name of step
          set_temp:
            type: integer
            description: Set temp to hold during this step
          end_by:
            type: string
            enum: [time, temp, none]
          time:
            type: integer
            description: Time this step lasts in seconds
          temp:
            type: integer
            description: Target temp that causes to next step if end_by == temp
          sensor:
            type: integer
            description: Sensor used for target temp if end_by = temp
        required:
          - name
          - index
          - step_name
          - set_temp
          - end_by
        example:
          name: "step"
          index: 0
          step_name: "Smoke"
          set_temp: 225
          end_by: "time"
          time: 7200

    device_temp_up:
      tags:
        - name: Device
      summary: Device temperature
      description: This message is sent when it changes 5 degrees C or 1 degree if device temp is high. (Not supported on 400.)
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [device_temp]
          value:
            type: integer
        required:
          - name
          - value
        example:
          name: "device_temp"
          value: 85

    dc_input_up:
      tags:
        - name: Device
      summary: DC input voltage
      description: This uplink is published when dc_input changes 0.1 volts.
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [dc_input]
          value:
            type: integer
            description: Input voltage in decivolts
        required:
          - name
          - value
        example:
          name: "dc_input"
          value: 120

    meat_alarm_triggered_up:
      tags:
        - name: Alarms
      summary: Meat alarm triggered
      description: This uplink is published when the meat is done.
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [meat_alarm_triggered]
          sensor:
            type: integer
            minimum: 1
            maximum: 3
        required:
          - name
          - sensor
        example:
          name: "meat_alarm_triggered"
          sensor: 1

    pit_alarm_active_up:
      tags:
        - name: Alarms
      summary: Pit alarm active
      description: This uplink is published when pit alarm becomes active after being enabled. (It becomes active when the pit temp becomes nearly at the set temp.
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [pit_alarm_active]
        required:
          - name
        example:
          name: "pit_alarm_active"

    pit_alarm_triggered_up:
      tags:
        - name: Alarms
      summary: Pit alarm triggered
      description: This uplink is published when the pit temp goes out of range set by pit alarm if the pit alarm is active.
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [pit_alarm_triggered]
        required:
          - name
        example:
          name: "pit_alarm_triggered"

    vent_advice_up:
      tags:
        - name: Alarms
      summary: Vent advice
      description: This uplink is published when pit temp has been above set temp for a long time.
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [vent_advice]
        required:
          - name
        example:
          name: "vent_advice"

    opened_up:
      tags:
        - name: Deprecated
      summary: Cooker opened - DEPRECATED - use openPitUplink instead
      description: This uplink is published when the controller detects the cooker is opened.
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [opened]
        required:
          - name
        example:
          name: "opened"

    closed_up:
      tags:
        - name: Deprecated
      summary: Cooker closed - DEPRECATED - use openPitUplink instead
      description: This uplink is published when the controller detects the cooker is closed.
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [closed]
        required:
          - name
        example:
          name: "closed"

    probe_overtemp_up:
      tags:
        - name: Alarms
      summary: Probe overtemperature
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [probe_overtemp]
          sensor:
            type: integer
        required:
          - name
          - sensor
        example:
          name: "probe_overtemp"
          sensor: 1

    device_overtemp_up:
      tags:
        - name: Alarms
      summary: Device overtemperature
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [device_overtemp]
        required:
          - name
        example:
          name: "device_overtemp"

    wifi_scan_up:
      tags:
        - name: Network
      summary: WiFi scan results
      description: This uplink is published at startup, and in response to wifi_scan downlink, to show results of discovered access points, one message for each AP discovered.
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [wifi_scan]
          index:
            type: integer
            description: the index from 0 to count - 1 of this message response to the wifi_scan downlink
          count:
            type: integer
            description: how many wifi_scan messages are being sent in one response to the wifi_scan downlink
          ssid:
            type: string
            description: the ssid of the access point
          rssi:
            type: integer
            description: rssi x 10
          bssid:
            type: string
            description: optional, bssid of AP
        required:
          - name
          - index
          - count
          - ssid
          - rssi
        example:
          name: "wifi_scan"
          index: 0
          count: 5
          ssid: "fb"
          rssi: -550

    wifi_scan_down:
      tags:
        - name: Network
      summary: Request WiFi scan
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [wifi_scan]
        required:
          - name
        example:
          name: "wifi_scan"

    timer_up:
      tags:
        - name: Cooking
      summary: Timer configuration and status
      description: The timer value, if action is not none, counts down. When it gets to zero, the action is performed, either
        changing the internal/effective set temperature to the hold temperature (hold), or sending an alert (alarm).
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [timer]
          action:
            type: string
            enum: [none, hold, alarm]
            description: what to do when the timer expires. If hold, change the internal set temperature to the hold temperature.
          value:
            type: integer
            description: start value of the timer in seconds
          hold:
            type: integer
            description: the hold temperature
          ends_at:
            type: integer
            description: if status is active, this is the timestamp when the timer will expire.
          status:
            type: string
            enum: [off, active, triggered]
            description: |-
              If status is triggered and action is hold, the controller has an effective set temperature equal to the hold temperature.
              If status is triggered and action is alarm, the controller is alerting.
              Note: this property is redundant and can be computed from action and ends_at.
              However, it might be different than the computed value temporarily due to time differences
              between the target and its communicating peers.
        required:
          - name
          - action
          - value
          - status
          - ends_at
        example:
          name: "timer"
          action: "hold"
          value: 3600
          status: "active"
          ends_at: 1747429645

    timer_down:
      tags:
        - name: Cooking
      summary: Set timer configuration or request timer configuration and status
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [timer]
          action:
            type: string
            enum: [none, hold, alarm]
            description: what to do when the timer expires. If hold, change the internal set temperature to the hold temperature.
          value:
            type: integer
            description: start value of the timer in seconds
          hold:
            type: integer
            description: the hold temperature
        required:
          - name
        example:
          name: "timer"
          action: "hold"
          value: 14400
          hold: 656

    reset_down:
      tags:
        - name: Device
      summary: "Reset different levels of the device: the mqtt connection, the wifi connection, or the processor"
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [reset]
          type:
            type: string
            enum: [mqtt, wifi, device]
        required:
          - name
          - type
        example:
          name: "reset"
          type: "device"

    log_level_down:
      tags:
        - name: Device
      summary: Set the log level that is output on topic flameboss/<device_id>/log
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [log_level]
          value:
            type: string
            enum: [info, warn]
        required:
          - name
          - value
        example:
          name: "log_level"
          value: "info"

    dl_start_down:
      tags:
        - name: Device
      summary: "Initiate a firmware update. **Warning: do not use this unless you know what you are doing — sending an incorrect version or a corrupt image will brick the device.**"
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [dl_start]
          target:
            type: string
            enum: [app]
            description: Must be "app". Other values are ignored.
          version:
            type: string
            description: Firmware version string (e.g. "1.2.3"). Must be strictly newer than the version currently running on the device, otherwise the downlink is ignored.
          path:
            type: string
            description: Path component appended to the broker's fw-dl base URL to form the download URL. The device fetches firmware from `http(s)://<broker>/fw-dl/<path>`.
          length:
            type: integer
            description: Expected byte length of the firmware image. Optional but recommended.
        required:
          - name
          - target
          - version
          - path
        example:
          name: "dl_start"
          target: "app"
          version: "1.2.3"
          path: "fb500-1.2.3.bin"
          length: 524288

    state_down:
      tags:
        - name: Device
      summary: Turns the cooker off (not supported on most targets because they do not have an on/off state)
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [state]
          value:
            type: string
            enum: [idle]
        required:
          - name
          - value
        example:
          name: "state"
          value: "idle"


    state_up:
      tags:
        - name: Device
      summary: "Says what state the cooker is in: idle, run, error, production (trying to pass the production test)"
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [state]
          value:
            type: string
            enum: [idle, run, error, production]
        required:
          - name
          - value
        example:
          name: "state"
          type: "run"

    connected_down:
      tags:
        - name: User
      summary: Device connected notification from the server
      description: Sent by the server to mobile apps when a device connects to the MQTT broker.
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [connected]
          device_id:
            type: integer
            description: The device that connected
          server:
            type: string
            description: The MQTT broker host the device connected to. If different from the app's current broker, the app should reconnect to this server for that device.
        required:
          - name
          - server
        example:
          name: "connected"
          device_id: 12345
          server: "myflameboss.com"

    connected_up:
      tags:
        - name: User
      summary: Request device connected status from the server
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [connected]
        required:
          - name
        example:
          name: "connected"

    cook_note_down:
      tags:
        - name: User
      summary: Cook note change notification
      description: Sent by the server to mobile apps when a cook note is created, updated, or deleted. The app should fetch the note content via the REST API.
      payload:
        type: object
        properties:
          name:
            type: string
            enum: [cook_note]
          action:
            type: string
            enum: [created, updated, deleted]
          id:
            type: integer
            description: The cook note ID
          cook_id:
            type: integer
            description: The cook this note belongs to
        required:
          - name
          - action
          - id
          - cook_id
        example:
          name: "cook_note"
          action: "created"
          id: 42
          cook_id: 12345
