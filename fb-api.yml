defaultContentType: application/json

servers:
  production:
    host: 'myflameboss.com'
    protocol: mqtts
    description: The production Flame Boss MQTT broker on the default secure port 8883. (Some devices use non-TLS connections on port 1883.)

channels:
  flameboss/{deviceId}/send/open:
    description: Public messages sent from the target to subscribers to support shared cooks
    parameters:
      deviceId:
        description: The integer unique identifier of the Flame Boss device
    servers:
      - $ref: '#/servers/production'
    messages:
      time_up:
        $ref: '#/components/messages/time_up'
      temps_up:
        $ref: '#/components/messages/temps_up'

  flameboss/{deviceId}/send/data:
    description: Messages sent from the target to subscribers (uplinks)
    parameters:
      deviceId:
        description: The integer unique identifier of the Flame Boss device
    servers:
      - $ref: '#/servers/production'
    messages:
      time_up:
        $ref: '#/components/messages/time_up'
      dns_up:
        $ref: '#/components/messages/dns_up'
      ip_up:
        $ref: '#/components/messages/ip_up'
      id_up:
        $ref: '#/components/messages/id_up'
      temps_up:
        $ref: '#/components/messages/temps_up'
      set_temp_up:
        $ref: '#/components/messages/set_temp_up'
      wifi_up:
        $ref: '#/components/messages/wifi_up'
      wifi_cx_up:
        $ref: '#/components/messages/wifi_cx_up'
      meat_alarm_up:
        $ref: '#/components/messages/meat_alarm_up'
      set_temp_limits_up:
        $ref: '#/components/messages/set_temp_limits_up'
      pit_alarm_up:
        $ref: '#/components/messages/pit_alarm_up'
      labels_up:
        $ref: '#/components/messages/labels_up'
      sound_up:
        $ref: '#/components/messages/sound_up'
      pid_up:
        $ref: '#/components/messages/pid_up'
      gpid_up:
        $ref: '#/components/messages/gpid_up'
      open_pit_up:
        $ref: '#/components/messages/open_pit_up'
      step_up:
        $ref: '#/components/messages/step_up'
      device_temp_up:
        $ref: '#/components/messages/device_temp_up'
      dc_input_up:
        $ref: '#/components/messages/dc_input_up'
      meat_alarm_triggered_up:
        $ref: '#/components/messages/meat_alarm_triggered_up'
      pit_alarm_active_up:
        $ref: '#/components/messages/pit_alarm_active_up'
      pit_alarm_triggered_up:
        $ref: '#/components/messages/pit_alarm_triggered_up'
      vent_advice_up:
        $ref: '#/components/messages/vent_advice_up'
      opened_up:
        $ref: '#/components/messages/opened_up'
      closed_up:
        $ref: '#/components/messages/closed_up'
      probe_overtemp_up:
        $ref: '#/components/messages/probe_overtemp_up'
      device_overtemp_up:
        $ref: '#/components/messages/device_overtemp_up'
      wifi_scan_up:
        $ref: '#/components/messages/wifi_scan_up'
      mqtt_up:
        $ref: '#/components/messages/mqtt_up'
      ble_cx_up:
        $ref: '#/components/messages/ble_cx_up'
      synced_up:
        $ref: '#/components/messages/synced_up'
      dl_progress_up:
        $ref: '#/components/messages/dl_progress_up'
      timer_up:
        $ref: '#/components/messages/timer_up'
      state_up:
        $ref: '#/components/messages/state_up'

  flameboss/{deviceId}/recv:
    summary: Messages sent to the target (downlinks)
    description: |
      Publish messages to this topic to control the target or request data from the target.
      To request updates, send a message with only the name property.
      For example: `{"name": "temps"}`
      To request update of all settings and readings, publish a sync message to
      this topic.
      For example: '{"name": "sync"}'
    parameters:
      deviceId:
        description: The integer unique identifier of the Flame Boss target
    servers:
      - $ref: '#/servers/production'
    messages:
      time_down:
        $ref: '#/components/messages/time_down'
      dns_down:
        $ref: '#/components/messages/dns_down'
      ip_down:
        $ref: '#/components/messages/ip_down'
      id_down:
        $ref: '#/components/messages/id_down'
      set_temp_down:
        $ref: '#/components/messages/set_temp_down'
      wifi_down:
        $ref: '#/components/messages/wifi_down'
      wifi_scan_down:
        $ref: '#/components/messages/wifi_scan_down'
      ble_cx_down:
        $ref: '#/components/messages/ble_cx_down'
      meat_alarm_down:
        $ref: '#/components/messages/meat_alarm_down'
      pit_alarm_down:
        $ref: '#/components/messages/pit_alarm_down'
      labels_down:
        $ref: '#/components/messages/labels_down'
      sound_down:
        $ref: '#/components/messages/sound_down'
      pid_down:
        $ref: '#/components/messages/pid_down'
      gpid_down:
        $ref: '#/components/messages/gpid_down'
      open_pit_down:
        $ref: '#/components/messages/open_pit_down'
      step_down:
        $ref: '#/components/messages/step_down'
      timer_down:
        $ref: '#/components/messages/timer_down'
      state_down:
        $ref: '#/components/messages/state_down'
      mqtt_down:
        $ref: '#/components/messages/mqtt_down'
      reset_down:
        $ref: '#/components/messages/reset_down'
      log_level_down:
        $ref: '#/components/messages/log_level_down'
      dl_start_down:
        $ref: '#/components/messages/dl_start_down'
      alarm_ack_down:
        $ref: '#/components/messages/alarm_ack_down'
      sync_down:
        $ref: '#/components/messages/sync_down'

  user/{userId}/recv:
    summary: Messages between the server and mobile apps
    description: |
      Mobile apps subscribe to this topic to receive asynchronous messages from the server.
      Apps publish uplinks to this topic to request updates.
    parameters:
      userId:
        description: The integer unique identifier of the user
    servers:
      - $ref: '#/servers/production'
    messages:
      connected_down:
        $ref: '#/components/messages/connected_down'
      connected_up:
        $ref: '#/components/messages/connected_up'
      cook_note_down:
        $ref: '#/components/messages/cook_note_down'

